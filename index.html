<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제주 & 중국어 여행 단어장</title>
  <style>
    :root {
      --primary-color: #ff7e36;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
      --text-color: #333333;
      --border-color: #e9ecef;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      padding-bottom: 80px;
    }

    header {
      background-color: var(--primary-color);
      color: white;
      text-align: center;
      padding: 1.2rem;
      font-size: 1.3rem;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* 탭 메뉴 */
    .tab-menu {
      display: flex;
      background-color: white;
      border-bottom: 1px solid var(--border-color);
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      text-align: center;
      border: none;
      background: none;
      font-size: 1rem;
      font-weight: bold;
      color: #777;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }

    .tab-btn.active {
      color: var(--primary-color);
      border-bottom-color: var(--primary-color);
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 15px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* 필터 및 검색 */
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    select, input[type="text"] {
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
    }

    .search-input {
      flex: 1;
    }

    /* 카드리스트 */
    .card-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
      position: relative;
    }

    .card-tag {
      display: inline-block;
      padding: 3px 8px;
      background-color: #fff3eb;
      color: var(--primary-color);
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .card-sub {
      color: #666;
      font-size: 0.9rem;
    }

    .cn-pinyin {
      color: #e65100;
      font-size: 0.85rem;
      margin-top: 2px;
    }

    .delete-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .delete-btn:hover {
      color: #ff4d4f;
    }

    /* FAB 추가 버튼 */
    .fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 56px;
      height: 56px;
      background-color: var(--primary-color);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      cursor: pointer;
      border: none;
    }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: white;
      padding: 20px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }

    .modal h3 {
      margin-bottom: 15px;
      font-size: 1.2rem;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 4px;
    }

    .form-group input, .form-group select {
      width: 100%;
    }

    .auto-fill-btn {
      width: 100%;
      padding: 8px;
      background-color: #fff3eb;
      color: var(--primary-color);
      border: 1px solid var(--primary-color);
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 5px;
      margin-bottom: 10px;
      transition: all 0.2s;
    }

    .auto-fill-btn:hover {
      background-color: #ffe4d3;
    }

    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .modal-btns button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-submit {
      background-color: var(--primary-color);
      color: white;
    }

    .btn-cancel {
      background-color: #e9ecef;
      color: #555;
    }
  </style>
</head>
<body>

  <header>🍊 제주 & 중국어 여행 단어장</header>

  <div class="tab-menu">
    <button class="tab-btn active" onclick="switchTab('jeju')">제주 방언</button>
    <button class="tab-btn" onclick="switchTab('cn')">중국어 회화</button>
  </div>

  <div class="container">
    <!-- 제주 방언 탭 -->
    <div id="tab-jeju" class="tab-content active">
      <div class="filter-bar">
        <input type="text" id="search-jeju" class="search-input" placeholder="검색어 입력..." oninput="renderList()">
      </div>
      <div id="list-jeju" class="card-list"></div>
    </div>

    <!-- 중국어 회화 탭 -->
    <div id="tab-cn" class="tab-content">
      <div class="filter-bar">
        <select id="filter-cn-cat" onchange="renderList()">
          <option value="전체">카테고리 전체</option>
          <option value="식당/식음료">식당/식음료</option>
          <option value="쇼핑/결제">쇼핑/결제</option>
          <option value="교통/길찾기">교통/길찾기</option>
          <option value="숙소/기타">숙소/기타</option>
        </select>
        <input type="text" id="search-cn" class="search-input" placeholder="검색어 입력..." oninput="renderList()">
      </div>
      <div id="list-cn" class="card-list"></div>
    </div>
  </div>

  <button class="fab" onclick="openModal()">+</button>

  <!-- 추가 모달창 -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3 id="modal-title">새 단어 추가</h3>
      <form id="add-form" onsubmit="handleSubmit(event)">
        
        <!-- 제주 방언 필드 -->
        <div id="fields-jeju">
          <div class="form-group">
            <label>제주 방언</label>
            <input type="text" id="input-jeju-word" placeholder="예: 혼저옵서예">
          </div>
          <div class="form-group">
            <label>표준어 뜻</label>
            <input type="text" id="input-jeju-meaning" placeholder="예: 어서오세요">
          </div>
        </div>

        <!-- 중국어 회화 필드 -->
        <div id="fields-cn" style="display: none;">
          <div class="form-group">
            <label>한국어 뜻 (입력 후 자동 채우기 가능)</label>
            <input type="text" id="input-cn-meaning" placeholder="예: 고수 빼주세요, 얼마예요?">
          </div>
          
          <button type="button" class="auto-fill-btn" onclick="autoFillChinese()">🪄 한자/발음 자동 채우기</button>

          <div class="form-group">
            <label>중국어 (한자)</label>
            <input type="text" id="input-cn-hanzi" placeholder="예: 不要香菜">
          </div>
          <div class="form-group">
            <label>병음 (발음)</label>
            <input type="text" id="input-cn-pinyin" placeholder="예: Bú yào xiāngcài">
          </div>
          <div class="form-group">
            <label>상황 카테고리</label>
            <select id="input-cn-cat">
              <option value="식당/식음료">식당/식음료</option>
              <option value="쇼핑/결제">쇼핑/결제</option>
              <option value="교통/길찾기">교통/길찾기</option>
              <option value="숙소/기타">숙소/기타</option>
            </select>
          </div>
        </div>

        <div class="modal-btns">
          <button type="button" class="btn-cancel" onclick="closeModal()">취소</button>
          <button type="submit" class="btn-submit">등록</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // 내장 중국어 여행 회화 자동채우기 사전 데이터
    const dictionary = [
      { key: "고수", hanzi: "不要香菜", pinyin: "Bú yào xiāngcài", meaning: "고수 빼주세요", cat: "식당/식음료" },
      { key: "얼마", hanzi: "多少钱？", pinyin: "Duōshao qián?", meaning: "얼마예요?", cat: "쇼핑/결제" },
      { key: "계산", hanzi: "买单", pinyin: "Mǎidān", meaning: "계산할게요", cat: "식당/식음료" },
      { key: "영수증", hanzi: "请给我小票", pinyin: "Qǐng gěi wǒ xiǎopiào", meaning: "영수증 주세요", cat: "쇼핑/결제" },
      { key: "화장실", hanzi: "洗手间在哪里？", pinyin: "Xǐshǒujiān zài nǎli?", meaning: "화장실이 어디인가요?", cat: "교통/길찾기" },
      { key: "메뉴판", hanzi: "请给我菜单", pinyin: "Qǐng gěi wǒ càidān", meaning: "메뉴판 주세요", cat: "식당/식음료" },
      { key: "물", hanzi: "请给我水", pinyin: "Qǐng gěi wǒ shuǐ", meaning: "물 좀 주세요", cat: "식당/식음료" },
      { key: "깎아", hanzi: "便宜一点儿吧", pinyin: "Piányi yīdiǎnr ba", meaning: "좀 깎아주세요", cat: "쇼핑/결제" },
      { key: "사진", hanzi: "能帮我拍照吗？", pinyin: "Néng bāng wǒ pāizhào ma?", meaning: "사진 좀 찍어주실 수 있나요?", cat: "숙소/기타" },
      { key: "안녕하세요", hanzi: "你好", pinyin: "Nǐ hǎo", meaning: "안녕하세요", cat: "숙소/기타" },
      { key: "감사", hanzi: "谢谢", pinyin: "Xièxie", meaning: "감사합니다", cat: "숙소/기타" }
    ];

    let currentTab = 'jeju';

    // 기본 데이터
    let jejuData = JSON.parse(localStorage.getItem('jejuData')) || [
      { id: 1, word: "혼저옵서예", meaning: "어서오세요" },
      { id: 2, word: "맨도롱 따똣", meaning: "먹기 좋을 만큼 따뜻함" }
    ];

    let cnData = JSON.parse(localStorage.getItem('cnData')) || [
      { id: 1, hanzi: "不要香菜", pinyin: "Bú yào xiāngcài", meaning: "고수 빼주세요", cat: "식당/식음료" },
      { id: 2, hanzi: "多少钱？", pinyin: "Duōshao qián?", meaning: "얼마예요?", cat: "쇼핑/결제" }
    ];

    function saveData() {
      localStorage.setItem('jejuData', JSON.stringify(jejuData));
      localStorage.setItem('cnData', JSON.stringify(cnData));
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

      if(tab === 'jeju') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('tab-jeju').classList.add('active');
      } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('tab-cn').classList.add('active');
      }
      renderList();
    }

    function renderList() {
      if(currentTab === 'jeju') {
        const query = document.getElementById('search-jeju').value.toLowerCase();
        const filtered = jejuData.filter(item => 
          item.word.toLowerCase().includes(query) || item.meaning.toLowerCase().includes(query)
        );
        
        const listEl = document.getElementById('list-jeju');
        listEl.innerHTML = filtered.map(item => `
          <div class="card">
            <div class="card-title">${item.word}</div>
            <div class="card-sub">${item.meaning}</div>
            <button class="delete-btn" onclick="deleteItem(${item.id})">&times;</button>
          </div>
        `).join('');
      } else {
        const query = document.getElementById('search-cn').value.toLowerCase();
        const cat = document.getElementById('filter-cn-cat').value;
        
        const filtered = cnData.filter(item => {
          const matchesQuery = item.hanzi.toLowerCase().includes(query) || 
                               item.pinyin.toLowerCase().includes(query) || 
                               item.meaning.toLowerCase().includes(query);
          const matchesCat = (cat === '전체') || (item.cat === cat);
          return matchesQuery && matchesCat;
        });

        const listEl = document.getElementById('list-cn');
        listEl.innerHTML = filtered.map(item => `
          <div class="card">
            <span class="card-tag">${item.cat}</span>
            <div class="card-title">${item.hanzi}</div>
            <div class="cn-pinyin">${item.pinyin}</div>
            <div class="card-sub" style="margin-top: 4px;">${item.meaning}</div>
            <button class="delete-btn" onclick="deleteItem(${item.id})">&times;</button>
          </div>
        `).join('');
      }
    }

    function deleteItem(id) {
      if(currentTab === 'jeju') {
        jejuData = jejuData.filter(item => item.id !== id);
      } else {
        cnData = cnData.filter(item => item.id !== id);
      }
      saveData();
      renderList();
    }

    function openModal() {
      document.getElementById('modal').classList.add('active');
      if(currentTab === 'jeju') {
        document.getElementById('modal-title').innerText = "새 제주 방언 추가";
        document.getElementById('fields-jeju').style.display = "block";
        document.getElementById('fields-cn').style.display = "none";
      } else {
        document.getElementById('modal-title').innerText = "새 중국어 회화 추가";
        document.getElementById('fields-jeju').style.display = "none";
        document.getElementById('fields-cn').style.display = "block";
      }
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.getElementById('add-form').reset();
    }

    // 🪄 [방법 1] 자동 채우기 핵심 기능
    function autoFillChinese() {
      const inputMeaning = document.getElementById('input-cn-meaning').value.trim();
      
      if (!inputMeaning) {
        alert("한국어 뜻을 먼저 입력해 주세요! (예: 고수, 얼마, 계산, 화장실 등)");
        return;
      }

      // 입력한 한국어 단어와 사전의 키워드 매칭
      const matched = dictionary.find(item => 
        inputMeaning.includes(item.key) || item.meaning.includes(inputMeaning)
      );

      if (matched) {
        document.getElementById('input-cn-meaning').value = matched.meaning;
        document.getElementById('input-cn-hanzi').value = matched.hanzi;
        document.getElementById('input-cn-pinyin').value = matched.pinyin;
        document.getElementById('input-cn-cat').value = matched.cat;
      } else {
        alert("사전에 등록되지 않은 표현입니다. 한자와 발음을 직접 입력해 주세요.");
      }
    }

    function handleSubmit(e) {
      e.preventDefault();
      
      if(currentTab === 'jeju') {
        const word = document.getElementById('input-jeju-word').value.trim();
        const meaning = document.getElementById('input-jeju-meaning').value.trim();
        if(!word || !meaning) return alert("모든 항목을 입력해 주세요.");
        
        jejuData.push({ id: Date.now(), word, meaning });
      } else {
        const hanzi = document.getElementById('input-cn-hanzi').value.trim();
        const pinyin = document.getElementById('input-cn-pinyin').value.trim();
        const meaning = document.getElementById('input-cn-meaning').value.trim();
        const cat = document.getElementById('input-cn-cat').value;
        if(!hanzi || !meaning) return alert("한국어 뜻과 한자는 필수 입력 항목입니다.");

        cnData.push({ id: Date.now(), hanzi, pinyin, meaning, cat });
      }

      saveData();
      renderList();
      closeModal();
    }

    // 초기 실행
    renderList();
  </script>
</body>
</html>
