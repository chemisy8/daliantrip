<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다롄 가족 여행 가이드 & 일정</title>
  <!-- TailWind CSS & FontAwesome Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Firebase SDK (v9 Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .tab-active { border-bottom: 3px solid #6366F1; color: #4F46E5; font-weight: bold; }
  </style>
</head>
<body class="bg-indigo-50/40 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-gradient-to-r from-indigo-600 via-indigo-500 to-purple-500 text-white p-4 sticky top-0 z-50 shadow-lg">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="text-xl font-black tracking-tight flex items-center gap-2">
        <i class="fa-solid fa-plane-departure text-yellow-300 animate-bounce"></i>
        <span>다롄 가족 여행</span>
        <i class="fa-solid fa-heart text-pink-300 text-xs"></i>
      </h1>
      <span class="text-[11px] bg-white/20 backdrop-blur-md px-2.5 py-1 rounded-full flex items-center gap-1.5 font-medium border border-white/30">
        <span class="w-2 h-2 bg-green-400 rounded-full animate-ping"></span> 실시간 동기화
      </span>
    </div>
  </header>

  <!-- Navigation Tabs -->
  <div class="bg-white/80 backdrop-blur-md shadow-sm sticky top-[60px] z-40 border-b border-indigo-100">
    <div class="max-w-md mx-auto flex">
      <button id="tab-schedule-btn" onclick="switchTab('schedule')" class="flex-1 py-3 text-center text-gray-500 text-sm font-medium tab-active transition-all">
        <i class="fa-solid fa-calendar-star mr-1 text-indigo-500"></i> 상세 일정
      </button>
      <button id="tab-places-btn" onclick="switchTab('places')" class="flex-1 py-3 text-center text-gray-500 text-sm font-medium transition-all">
        <i class="fa-solid fa-map-location-dot mr-1 text-pink-500"></i> 장소 & 꿀팁
      </button>
      <button id="tab-speech-btn" onclick="switchTab('speech')" class="flex-1 py-3 text-center text-gray-500 text-sm font-medium transition-all">
        <i class="fa-solid fa-comments text-amber-500 mr-1"></i> 생존 회화
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <main class="max-w-md mx-auto p-4 flex-1 w-full space-y-4">

    <!-- TAB 0: SCHEDULE -->
    <section id="tab-schedule" class="space-y-4">
      <div class="flex justify-between items-center px-1">
        <h2 class="text-base font-bold text-gray-800 flex items-center gap-2">
          <i class="fa-solid fa-route text-indigo-500"></i> 시간대별 이동 동선
        </h2>
        <div class="flex gap-1.5">
          <button onclick="resetToNewDefault()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-2.5 py-1.5 rounded-full text-xs font-medium transition">
            <i class="fa-solid fa-rotate-left mr-1"></i> 일정 초기화
          </button>
          <button onclick="openModal('schedule')" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white px-3 py-1.5 rounded-full text-xs font-semibold shadow-md shadow-indigo-200 transition">
            <i class="fa-solid fa-plus mr-1"></i> 일정 추가
          </button>
        </div>
      </div>

      <div id="schedule-container" class="space-y-4">
        <!-- Dynamic Schedule Cards -->
      </div>
    </section>

    <!-- TAB 1: PLACES -->
    <section id="tab-places" class="space-y-4 hidden">
      <div class="flex justify-between items-center px-1">
        <h2 class="text-base font-bold text-gray-800 flex items-center gap-2">
          <i class="fa-solid fa-utensils text-pink-500"></i> 추천 맛집 & 관광지
        </h2>
        <button onclick="openModal('place')" class="bg-pink-500 hover:bg-pink-600 active:scale-95 text-white px-3 py-1.5 rounded-full text-xs font-semibold shadow-md shadow-pink-200 transition">
          <i class="fa-solid fa-plus mr-1"></i> 장소 추가
        </button>
      </div>

      <div id="places-container" class="space-y-3">
        <!-- Dynamic Cards -->
      </div>
    </section>

    <!-- TAB 2: SPEECH -->
    <section id="tab-speech" class="space-y-4 hidden">
      <div class="flex justify-between items-center px-1">
        <h2 class="text-base font-bold text-gray-800 flex items-center gap-2">
          <i class="fa-solid fa-volume-high text-amber-500"></i> 현지 생존 회화
        </h2>
        <button onclick="openModal('speech')" class="bg-amber-500 hover:bg-amber-600 active:scale-95 text-white px-3 py-1.5 rounded-full text-xs font-semibold shadow-md shadow-amber-200 transition">
          <i class="fa-solid fa-plus mr-1"></i> 회화 추가
        </button>
      </div>

      <div id="speech-container" class="space-y-3">
        <!-- Dynamic Cards -->
      </div>
    </section>

  </main>

  <!-- ADD / EDIT MODAL -->
  <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-xs hidden flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl max-w-md w-full p-5 space-y-4 shadow-2xl border border-indigo-50">
      <h3 id="modal-title" class="text-lg font-bold text-gray-800 flex items-center gap-2">
        <i class="fa-solid fa-pen-sparkles text-indigo-500"></i> 항목 추가
      </h3>
      
      <form id="modal-form" class="space-y-3">
        <input type="hidden" id="modal-type">
        <input type="hidden" id="modal-edit-id">
        
        <!-- Fields for Schedule -->
        <div id="field-sched-day" class="space-y-1">
          <label class="text-xs font-bold text-gray-600">일차 (DAY)</label>
          <select id="input-sched-day" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm bg-gray-50">
            <option value="1일차">1일차 ✈️</option>
            <option value="2일차">2일차 🌊</option>
            <option value="3일차">3일차 🐬</option>
            <option value="4일차">4일차 🛍️</option>
          </select>
        </div>
        <div id="field-sched-title" class="space-y-1">
          <label class="text-xs font-bold text-gray-600">시간대 & 일정 제목 (한자명 포함)</label>
          <input type="text" id="input-sched-title" placeholder="예: [14:00] 성해광장 (星海广场)" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-indigo-500">
        </div>
        <div id="field-sched-addr" class="space-y-1">
          <label class="text-xs font-bold text-gray-600">주소 / 한자 주소</label>
          <input type="text" id="input-sched-addr" placeholder="예: 沙河口区 中山路 572号" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-indigo-500">
        </div>
        <div id="field-sched-trans" class="space-y-1">
          <label class="text-xs font-bold text-gray-600">이동 방법 & 소요 시간</label>
          <input type="text" id="input-sched-trans" placeholder="예: 🚕 택시 약 25분 (약 35元)" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-indigo-500">
        </div>
        <div id="field-sched-desc" class="space-y-1">
          <label class="text-xs font-bold text-gray-600">블로그 꿀팁 & 주요 특징</label>
          <textarea id="input-sched-desc" rows="2" placeholder="예: 바닷바람 강함. 아이 겉옷 필수!" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-indigo-500"></textarea>
        </div>

        <!-- Fields for Place -->
        <div id="field-place-name" class="space-y-1 hidden">
          <label class="text-xs font-bold text-gray-600">장소명 / 한자명</label>
          <input type="text" id="input-place-title" placeholder="예: 喝丢一只鞋 (헤디우이즈셰)" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-indigo-500">
        </div>
        <div id="field-place-desc" class="space-y-1 hidden">
          <label class="text-xs font-bold text-gray-600">블로그 꿀팁 & 주요 정보</label>
          <textarea id="input-place-desc" rows="3" placeholder="예: 꿔바로우 바삭하게 요청, 아이용 계란볶음밥 추천" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-indigo-500"></textarea>
        </div>

        <!-- Fields for Speech -->
        <div id="field-speech-kr" class="space-y-1 hidden relative">
          <label class="text-xs font-bold text-gray-600 flex justify-between">
            <span>한국어 의미</span>
            <span class="text-[10px] text-indigo-500 font-normal">* 검색 시 중국어 자동추천</span>
          </label>
          <input type="text" id="input-speech-kr" oninput="onSpeechKrInput(this.value)" placeholder="예: 물, 고수, 얼마, 택시, 영수증..." class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-indigo-500" autocomplete="off">
          
          <!-- Auto-complete Dropdown List -->
          <div id="speech-autocomplete" class="hidden absolute left-0 right-0 top-[65px] bg-white border border-indigo-100 rounded-xl shadow-lg z-50 max-h-40 overflow-y-auto divide-y divide-gray-50"></div>
        </div>
        <div id="field-speech-cn" class="space-y-1 hidden">
          <label class="text-xs font-bold text-gray-600">중국어 (한자)</label>
          <input type="text" id="input-speech-cn" placeholder="예: 不要香菜" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-indigo-500">
        </div>
        <div id="field-speech-py" class="space-y-1 hidden">
          <label class="text-xs font-bold text-gray-600">발음 (병음/한글)</label>
          <input type="text" id="input-speech-py" placeholder="예: 부야오 씨앙차이" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:outline-indigo-500">
        </div>

        <div class="flex justify-end space-x-2 pt-3">
          <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-50">취소</button>
          <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 shadow-md">저장하기</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer with sun0 Copyright -->

    <div class="max-w-md mx-auto text-center space-y-2">
      <div class="flex items-center justify-center gap-1.5 text-xs text-indigo-400 font-medium">

        <i class="fa-solid fa-heart text-pink-400 text-[10px]"></i>
      </div>
      <p class="text-xs text-gray-400 font-light">
        Made with <i class="fa-solid fa-heart text-red-400 text-[11px] mx-0.5"></i> by <span class="font-bold text-indigo-600">sun0</span>
      </p>
      <p class="text-[10px] text-gray-300">© sun0. All rights reserved.</p>
    </div>
  </footer>

      { day: "4일차", title: "[10:00] 대형마트 쇼핑 (월마트/대윤발 大润发)", addr: "中山区 胜利广场 附近", trans: "🚕 택시 약 10분", desc: "💡 [꿀팁] 해산물 스낵, 칭따오 맥주, 아이 간식류 구매. 500元 이상 구매 시 귀국 짐 공간 체크" },
      { day: "4일차", title: "[12:30] 다롄 저우수이쯔 공항 이동 및 귀국", addr: "甘井子区 迎客路 100号", trans: "🚕 택시 약 30분 (출발 2시간 30분 전 도착)", desc: "💡 [꿀팁] 공항 내 유아 휴게실 이용 가능. 남은 위안화 현금 소진" }
    ];

    const defaultPlaces = [
      { name: "喝丢一只鞋 (양꼬치 🍢)", tip: "💡 꿔바로우(锅包肉) 바삭하게 요청. 아이용 계란 볶음밥(鸡蛋炒饭) 추천.", query: "喝丢一只鞋" },
      { name: "Xi Ding Hai Dan Dumplings (喜鼎海胆水饺 🥟)", tip: "💡 성게알 만두 및 아이용 새우계란만두(三鲜水饺) 추천. 대기 시간 확인 필수.", query: "喜鼎海胆水饺" },
      { name: "Mangata Coffee ☕", tip: "💡 2층 테라스 창가석이 성해대교 뷰 명당.", query: "Mangata Coffee" }
    ];

    const defaultSpeech = [
      { kr: "메뉴판 좀 주세요 📖", cn: "请给我菜单", py: "칭 게이 워 차이단" },
      { kr: "고수 넣지 말아주세요 🌿", cn: "不要香菜", py: "부야오 씨앙차이" },
      { kr: "덜 매운 것으로 해주세요 🌶️", cn: "做辣一点吧 / 少辣", py: "쭤 라 이뎬 바 / 샤오 라" },
      { kr: "어린이용 의자 있나요? 👶", cn: "有儿童椅子吗？", py: "요우 얼퉁 이쯔 마?" },
      { kr: "따뜻한 물 부탁합니다 ☕", cn: "请给我热水", py: "칭 게이 워 러슈에이" },
      { kr: "이것으로 주세요 👉", cn: "我要这个", py: "워 야오 쩌거" },
      { kr: "계산해 주세요 💳", cn: "买单 / 结账", py: "마이딴 / 지에짱" },
      { kr: "포장해 주세요 🛍️", cn: "打包", py: "따바오" },
      { kr: "수하물 찾는 곳이 어디인가요? 🧳", cn: "行李提取处在哪儿？", py: "싱리 티취추 자이나얼?" },
      { kr: "택시 승강장이 어디인가요? 🚖", cn: "出租车乘车点在哪儿？", py: "추쭈처 청처뎬 자이나얼?" },
      { kr: "이 주소로 가주세요 📍", cn: "请带我去这个地址", py: "칭 따이 워 취 쩌거 디즈" },
      { kr: "미터기 켜주세요 ⏱️", cn: "请打表", py: "칭 타뱌오" },
      { kr: "얼마인가요? 💰", cn: "多少钱？", py: "두어샤오 치엔？" },
      { kr: "화장실이 어디인가요? 🚻", cn: "洗手间在哪儿？", py: "씨쇼우지에 자이나얼?" },
      { kr: "감사합니다 / 천만에요 😊", cn: "谢谢 / 不客气", py: "셰셰 / 부커치" }
    ];

    let currentSchedules = {};
    let currentPlaces = {};
    let currentSpeech = {};

    // 데이터 수신 및 자동으로 구버전 데이터 업데이트
    db.ref("schedules").on("value", (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        newSchedules.forEach(s => db.ref("schedules").push(s));
        return;
      }
      
      // 구버전(주소 데이터 없음) 데이터 검출 시 강제 최신 데이터로 업그레이드
      const hasOldVersion = Object.values(data).some(item => !item.addr);
      if (hasOldVersion) {
        db.ref("schedules").remove().then(() => {
          newSchedules.forEach(s => db.ref("schedules").push(s));
        });
        return;
      }

      currentSchedules = data;
      renderSchedules();
    });

    db.ref("places").on("value", (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        defaultPlaces.forEach(p => db.ref("places").push(p));
        return;
      }
      currentPlaces = data;
      renderPlaces();
    });

    db.ref("speech").on("value", (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        defaultSpeech.forEach(s => db.ref("speech").push(s));
        return;
      }
      currentSpeech = data;
      renderSpeech();
    });

    function resetToNewDefault() {
      if (confirm("일정을 디테일 버전으로 다시 불러오시겠습니까?")) {
        db.ref("schedules").remove().then(() => {
          newSchedules.forEach(s => db.ref("schedules").push(s));
        });
      }
    }

    function renderSchedules() {
      const container = document.getElementById("schedule-container");
      container.innerHTML = "";

      const days = [
        { name: "1일차", icon: "fa-plane-arrival" },
        { name: "2일차", icon: "fa-water" },
        { name: "3일차", icon: "fa-fish" },
        { name: "4일차", icon: "fa-bag-shopping" }
      ];
      
      days.forEach(dayObj => {
        const dayItems = Object.keys(currentSchedules)
          .filter(k => currentSchedules[k].day === dayObj.name)
          .map(k => ({ key: k, ...currentSchedules[k] }));

        let itemsHtml = "";
        if (dayItems.length === 0) {
          itemsHtml = `<p class="text-xs text-gray-400 py-2 italic text-center">등록된 일정이 없습니다.</p>`;
        } else {
          dayItems.forEach(item => {
            itemsHtml += `
              <div class="bg-gray-50/90 p-3.5 rounded-xl border border-gray-100 space-y-1.5 hover:bg-gray-100/80 transition">
                <div class="flex justify-between items-start">
                  <div class="text-xs font-bold text-gray-800 leading-snug">${item.title}</div>
                  <div class="flex gap-1 ml-2 shrink-0">
                    <button onclick="editItem('schedule', '${item.key}')" class="text-gray-300 hover:text-indigo-600 p-1 text-xs"><i class="fa-solid fa-pen-to-square"></i></button>
                    <button onclick="deleteItem('schedules', '${item.key}')" class="text-gray-300 hover:text-red-500 p-1 text-xs"><i class="fa-solid fa-trash"></i></button>
                  </div>
                </div>

                ${item.addr ? `
                  <div class="text-[11px] text-gray-500 flex items-center gap-1">
                    <i class="fa-solid fa-location-dot text-indigo-400 shrink-0"></i>
                    <span>${item.addr}</span>
                  </div>
                ` : ''}

                ${item.trans ? `
                  <div class="text-[11px] text-indigo-600 font-medium bg-indigo-50/60 px-2 py-1 rounded-md inline-block">
                    ${item.trans}
                  </div>
                ` : ''}

                ${item.desc ? `
                  <div class="text-[11px] text-amber-800 bg-amber-50/80 p-2 rounded-lg border border-amber-100/60 leading-relaxed mt-1">
                    ${item.desc}
                  </div>
                ` : ''}
              </div>
            `;
          });
        }

        container.innerHTML += `
          <div class="bg-white p-4 rounded-2xl shadow-sm border border-indigo-50 space-y-3">
            <h3 class="font-bold text-indigo-600 text-xs border-b border-indigo-50 pb-2 flex items-center justify-between">
              <span class="flex items-center gap-1.5 text-sm">
                <i class="fa-solid ${dayObj.icon} text-indigo-500"></i> ${dayObj.name}
              </span>
              <span class="text-[10px] font-normal text-indigo-300">DAY ROUTE</span>
            </h3>
            <div class="space-y-2.5 pt-0.5">${itemsHtml}</div>
          </div>
        `;
      });
    }

    function renderPlaces() {
      const container = document.getElementById("places-container");
      container.innerHTML = "";
      Object.keys(currentPlaces).forEach(key => {
        const p = currentPlaces[key];
        const amapUrl = `https://uri.amap.com/search?keyword=${encodeURIComponent(p.query || p.name)}`;
        
        container.innerHTML += `
          <div class="bg-white p-4 rounded-2xl shadow-sm border border-indigo-50 space-y-2.5">
            <div class="flex justify-between items-start">
              <h3 class="font-bold text-gray-800 text-sm flex items-center gap-1.5">
                <i class="fa-solid fa-store text-pink-400"></i> ${p.name}
              </h3>
              <div class="flex gap-1">
                <button onclick="editItem('place', '${key}')" class="text-gray-300 hover:text-indigo-600 p-1"><i class="fa-solid fa-pen-to-square"></i></button>
                <button onclick="deleteItem('places', '${key}')" class="text-gray-300 hover:text-red-500 p-1"><i class="fa-solid fa-trash"></i></button>
              </div>
            </div>
            <p class="text-xs text-gray-600 bg-amber-50/70 p-3 rounded-xl border border-amber-100/80 leading-relaxed">${p.tip}</p>
            <div class="pt-0.5 flex justify-end">
              <a href="${amapUrl}" target="_blank" class="inline-flex items-center text-[11px] bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full font-medium hover:bg-blue-100 transition">
                <i class="fa-solid fa-map-location-dot mr-1"></i> 고덕지도(高德地图) 연결
              </a>
            </div>
          </div>
        `;
      });
    }

    function renderSpeech() {
      const container = document.getElementById("speech-container");
      container.innerHTML = "";
      Object.keys(currentSpeech).forEach(key => {
        const s = currentSpeech[key];
        container.innerHTML += `
          <div class="bg-white p-3.5 rounded-2xl shadow-sm border border-indigo-50 flex justify-between items-center hover:border-amber-200 transition">
            <div class="space-y-0.5 flex-1 pr-2">
              <div class="text-[11px] font-bold text-indigo-600 flex items-center gap-1">${s.kr}</div>
              <div class="text-base font-black text-gray-800 tracking-wide">${s.cn}</div>
              <div class="text-[11px] text-gray-400 font-medium">${s.py}</div>
            </div>
            <div class="flex items-center gap-1.5">
              <button onclick="speakChinese('${s.cn}')" class="w-9 h-9 bg-amber-50 text-amber-600 rounded-full flex items-center justify-center hover:bg-amber-100 active:scale-90 transition shadow-xs">
                <i class="fa-solid fa-volume-high text-sm"></i>
              </button>
              <button onclick="editItem('speech', '${key}')" class="text-gray-300 hover:text-indigo-600 p-1 text-xs"><i class="fa-solid fa-pen-to-square"></i></button>
              <button onclick="deleteItem('speech', '${key}')" class="text-gray-300 hover:text-red-500 p-1 text-xs"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
        `;
      });
    }

    function onSpeechKrInput(val) {
      const box = document.getElementById("speech-autocomplete");
      const keyword = val.trim().toLowerCase();
      
      if (!keyword) {
        box.classList.add("hidden");
        box.innerHTML = "";
        return;
      }

      const matches = speechDictionary.filter(item => item.kr.toLowerCase().includes(keyword));

      if (matches.length === 0) {
        box.classList.add("hidden");
        box.innerHTML = "";
        return;
      }

      box.innerHTML = matches.map(m => `
        <div onclick="selectSpeechAuto('${m.kr}', '${m.cn}', '${m.py}')" class="p-2.5 hover:bg-indigo-50 cursor-pointer text-xs space-y-0.5">
          <div class="font-bold text-gray-800">${m.kr}</div>
          <div class="text-[11px] text-indigo-600 font-semibold">${m.cn} <span class="text-gray-400 font-normal">(${m.py})</span></div>
        </div>
      `).join("");

      box.classList.remove("hidden");
    }

    function selectSpeechAuto(kr, cn, py) {
      document.getElementById("input-speech-kr").value = kr;
      document.getElementById("input-speech-cn").value = cn;
      document.getElementById("input-speech-py").value = py;
      
      const box = document.getElementById("speech-autocomplete");
      box.classList.add("hidden");
      box.innerHTML = "";
    }

    function speakChinese(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const cleanText = text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
      } else {
        alert("이 브라우저는 음성 재생을 지원하지 않습니다.");
      }
    }

    function switchTab(tab) {
      document.getElementById("tab-schedule").classList.toggle("hidden", tab !== 'schedule');
      document.getElementById("tab-places").classList.toggle("hidden", tab !== 'places');
      document.getElementById("tab-speech").classList.toggle("hidden", tab !== 'speech');

      document.getElementById("tab-schedule-btn").classList.toggle("tab-active", tab === 'schedule');
      document.getElementById("tab-places-btn").classList.toggle("tab-active", tab === 'places');
      document.getElementById("tab-speech-btn").classList.toggle("tab-active", tab === 'speech');
    }

    function openModal(type, editId = null) {
      document.getElementById("modal-type").value = type;
      document.getElementById("modal-edit-id").value = editId || "";
      
      const titles = { schedule: '일정 추가 🗓️', place: '장소 추가 📍', speech: '회화 추가 💬' };
      document.getElementById("modal-title").innerHTML = `<i class="fa-solid fa-pen-sparkles text-indigo-500"></i> ${editId ? '항목 수정' : titles[type]}`;
      
      document.getElementById("field-sched-day").classList.toggle("hidden", type !== 'schedule');
      document.getElementById("field-sched-title").classList.toggle("hidden", type !== 'schedule');
      document.getElementById("field-sched-addr").classList.toggle("hidden", type !== 'schedule');
      document.getElementById("field-sched-trans").classList.toggle("hidden", type !== 'schedule');
      document.getElementById("field-sched-desc").classList.toggle("hidden", type !== 'schedule');

      document.getElementById("field-place-name").classList.toggle("hidden", type !== 'place');
      document.getElementById("field-place-desc").classList.toggle("hidden", type !== 'place');

      document.getElementById("field-speech-kr").classList.toggle("hidden", type !== 'speech');
      document.getElementById("field-speech-cn").classList.toggle("hidden", type !== 'speech');
      document.getElementById("field-speech-py").classList.toggle("hidden", type !== 'speech');

      const autoBox = document.getElementById("speech-autocomplete");
      autoBox.classList.add("hidden");
      autoBox.innerHTML = "";

      if (editId) {
        if (type === 'schedule') {
          const item = currentSchedules[editId];
          document.getElementById("input-sched-day").value = item.day;
          document.getElementById("input-sched-title").value = item.title;
          document.getElementById("input-sched-addr").value = item.addr || "";
          document.getElementById("input-sched-trans").value = item.trans || "";
          document.getElementById("input-sched-desc").value = item.desc || "";
        } else if (type === 'place') {
          const item = currentPlaces[editId];
          document.getElementById("input-place-title").value = item.name;
          document.getElementById("input-place-desc").value = item.tip;
        } else {
          const item = currentSpeech[editId];
          document.getElementById("input-speech-kr").value = item.kr;
          document.getElementById("input-speech-cn").value = item.cn;
          document.getElementById("input-speech-py").value = item.py;
        }
      } else {
        document.getElementById("modal-form").reset();
      }

      document.getElementById("modal").classList.remove("hidden");
    }

    function editItem(type, key) { openModal(type, key); }

    function deleteItem(path, key) {
      if (confirm("정말 삭제하시겠습니까?")) {
        db.ref(`${path}/${key}`).remove();
      }
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
      document.getElementById("modal-form").reset();
      const autoBox = document.getElementById("speech-autocomplete");
      autoBox.classList.add("hidden");
      autoBox.innerHTML = "";
    }

    document.getElementById("modal-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const type = document.getElementById("modal-type").value;
      const editId = document.getElementById("modal-edit-id").value;

      if (type === 'schedule') {
        const day = document.getElementById("input-sched-day").value;
        const title = document.getElementById("input-sched-title").value;
        const addr = document.getElementById("input-sched-addr").value;
        const trans = document.getElementById("input-sched-trans").value;
        const desc = document.getElementById("input-sched-desc").value;
        if (!title) return;

        const payload = { day, title, addr, trans, desc };
        if (editId) db.ref(`schedules/${editId}`).update(payload);
        else db.ref("schedules").push(payload);
      } else if (type === 'place') {
        const name = document.getElementById("input-place-title").value;
        const tip = document.getElementById("input-place-desc").value;
        if (!name) return;

        const payload = { name, tip, query: name };
        if (editId) db.ref(`places/${editId}`).update(payload);
        else db.ref("places").push(payload);
      } else {
        const kr = document.getElementById("input-speech-kr").value;
        const cn = document.getElementById("input-speech-cn").value;
        const py = document.getElementById("input-speech-py").value;
        if (!cn) return;

        const payload = { kr, cn, py };
        if (editId) db.ref(`speech/${editId}`).update(payload);
        else db.ref("speech").push(payload);
      }

      closeModal();
    });
  </script>
</body>
</html>
