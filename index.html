<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다롄 가족 여행</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <!-- Tailwind CSS & FontAwesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', sans-serif; }
    .active-tab { border-bottom: 3px solid #6366f1; color: #4f46e5; font-weight: bold; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">

  <!-- 헤더 -->
  <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-4 sticky top-0 z-50 shadow-md">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold flex items-center gap-2">
        ✈️ 다롄 가족 여행 💕
      </h1>
      <span class="text-xs bg-white/20 px-2.5 py-1 rounded-full flex items-center gap-1">
        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> 실시간 동기화
      </span>
    </div>
  </header>

  <!-- 탭 메뉴 -->
  <nav class="bg-white border-b border-slate-200 sticky top-[60px] z-40 shadow-sm">
    <div class="max-w-md mx-auto flex text-center text-sm">
      <button onclick="switchTab('schedule')" id="tab-schedule" class="flex-1 py-3 active-tab">
        <i class="fa-regular fa-clock mr-1"></i>상세 일정
      </button>
      <button onclick="switchTab('places')" id="tab-places" class="flex-1 py-3 text-slate-500">
        <i class="fa-solid fa-map-location-dot mr-1"></i>장소 & 꿀팁
      </button>
      <button onclick="switchTab('speech')" id="tab-speech" class="flex-1 py-3 text-slate-500">
        <i class="fa-solid fa-comments mr-1"></i>생존 회화
      </button>
    </div>
  </nav>

  <!-- 메인 컨테이너 -->
  <main class="max-w-md mx-auto p-4">

    <!-- 1. 상세 일정 탭 -->
    <section id="sec-schedule" class="space-y-4">
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-base font-bold text-slate-800 flex items-center gap-1">
          🗺️ 시간대별 이동 동선
        </h2>
        <div class="flex gap-1.5">
          <!-- 🔄 데이터 초기화/복구 버튼 -->
          <button onclick="resetToInitialData()" class="text-xs bg-amber-500 text-white px-2.5 py-1.5 rounded-lg hover:bg-amber-600 shadow-sm flex items-center gap-1">
            <i class="fa-solid fa-rotate-left"></i> 기본 복구
          </button>
          <button onclick="openModal('schedule')" class="text-xs bg-indigo-600 text-white px-2.5 py-1.5 rounded-lg hover:bg-indigo-700 shadow-sm">
            + 일정 추가
          </button>
        </div>
      </div>
      <div id="schedule-list" class="space-y-4"></div>
    </section>

    <!-- 2. 장소 & 꿀팁 탭 -->
    <section id="sec-places" class="space-y-4 hidden">
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-lg font-bold text-slate-800">📌 주요 장소 & 정보</h2>
        <button onclick="openModal('place')" class="text-xs bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700 shadow-sm">
          + 장소 추가
        </button>
      </div>
      <div id="places-list" class="space-y-3"></div>
    </section>

    <!-- 3. 생존 회화 탭 -->
    <section id="sec-speech" class="space-y-4 hidden">
      <div class="flex justify-between items-center mb-2">
        <h2 class="text-lg font-bold text-slate-800">🗣️ 필수 중국어 회화</h2>
        <button onclick="openModal('speech')" class="text-xs bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700 shadow-sm">
          + 표현 추가
        </button>
      </div>
      <div id="speech-list" class="space-y-3"></div>
    </section>

  </main>

  <!-- 모달 (추가/수정용) -->
  <div id="modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl max-w-sm w-full p-5 space-y-4 shadow-xl">
      <h3 id="modal-title" class="text-md font-bold border-b pb-2 text-slate-800">항목 추가/수정</h3>
      
      <!-- 일정 모달 폼 -->
      <form id="form-schedule" class="space-y-3 text-sm hidden">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">일차 (숫자만)</label>
          <input type="number" id="sc-day" min="1" value="1" class="w-full border rounded p-2">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">시간 및 제목</label>
          <input type="text" id="sc-title" placeholder="예: [19:30] 동강 숙소 체크인" class="w-full border rounded p-2">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">주소/위치 (고덕지도용)</label>
          <input type="text" id="sc-addr" placeholder="주소를 입력하세요" class="w-full border rounded p-2">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">이동 정보</label>
          <input type="text" id="sc-trans" placeholder="예: 🚕 택시 | 약 10분 소요" class="w-full border rounded p-2">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">꿀팁 / 메모</label>
          <textarea id="sc-tip" placeholder="참고 메모 입력" class="w-full border rounded p-2 h-20"></textarea>
        </div>
      </form>

      <!-- 장소 모달 폼 -->
      <form id="form-place" class="space-y-3 text-sm hidden">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">장소/상호명</label>
          <input type="text" id="pl-title" placeholder="예: 喜鼎海胆水饺 (성해湾1호점)" class="w-full border rounded p-2">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">카테고리</label>
          <input type="text" id="pl-cat" placeholder="예: 맛집 / 명소 / 쇼핑 / 숙소" class="w-full border rounded p-2">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">주소</label>
          <input type="text" id="pl-addr" placeholder="중문 주소 입력" class="w-full border rounded p-2">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">꿀팁 & 메모</label>
          <textarea id="pl-tip" placeholder="추천 메뉴, 이용 꿀팁 등" class="w-full border rounded p-2 h-20"></textarea>
        </div>
      </form>

      <!-- 회화 모달 폼 -->
      <form id="form-speech" class="space-y-3 text-sm hidden">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">한국어 뜻</label>
          <input type="text" id="sp-kor" placeholder="예: 고수 넣지 말아주세요" class="w-full border rounded p-2">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">중국어 (한자)</label>
          <input type="text" id="sp-cn" placeholder="예: 不要香菜" class="w-full border rounded p-2">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">발음 (병음/한글발음)</label>
          <input type="text" id="sp-py" placeholder="예: Bú yào xiāngcài (부야오 샹차이)" class="w-full border rounded p-2">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">상황/팁</label>
          <input type="text" id="sp-tip" placeholder="예: 식당 주문 시" class="w-full border rounded p-2">
        </div>
      </form>

      <div class="flex justify-end gap-2 pt-2 border-t">
        <button onclick="closeModal()" class="px-3 py-1.5 text-xs text-slate-600 bg-slate-100 rounded hover:bg-slate-200">취소</button>
        <button onclick="saveData()" class="px-3 py-1.5 text-xs text-white bg-indigo-600 rounded hover:bg-indigo-700">저장</button>
      </div>
    </div>
  </div>

    let editKey = null;

    // 🔥 Firebase DB 실시간 수신
    db.ref("schedules").on("value", (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        initialSchedules.forEach(item => db.ref("schedules").push(item));
        return;
      }
      currentSchedules = data;
      renderSchedules();
    });

    db.ref("places").on("value", (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        initialPlaces.forEach(item => db.ref("places").push(item));
        return;
      }
      currentPlaces = data;
      renderPlaces();
    });

    db.ref("speech").on("value", (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        initialSpeech.forEach(item => db.ref("speech").push(item));
        return;
      }
      currentSpeech = data;
      renderSpeech();
    });

    // 🔄 기본 데이터 전체 복구 기능
    function resetToInitialData() {
      if (confirm("정말로 모든 일정을 초기 작성해 둔 기본 일정(1~4일차)으로 복구하시겠습니까?\n(직접 수정하시거나 추가한 일정은 삭제됩니다.)")) {
        db.ref("schedules").remove().then(() => {
          initialSchedules.forEach(item => db.ref("schedules").push(item));
        });
        db.ref("places").remove().then(() => {
          initialPlaces.forEach(item => db.ref("places").push(item));
        });
        db.ref("speech").remove().then(() => {
          initialSpeech.forEach(item => db.ref("speech").push(item));
        });
        alert("기본 데이터로 복구되었습니다!");
      }
    }

    // 탭 전환
    function switchTab(type) {
      ['schedule', 'places', 'speech'].forEach(t => {
        document.getElementById(`sec-${t}`).classList.add('hidden');
        document.getElementById(`tab-${t}`).classList.remove('active-tab');
        document.getElementById(`tab-${t}`).classList.add('text-slate-500');
      });
      document.getElementById(`sec-${type}`).classList.remove('hidden');
      document.getElementById(`tab-${type}`).classList.add('active-tab');
      document.getElementById(`tab-${type}`).classList.remove('text-slate-500');
    }

    // 1. 일정 렌더링
    function renderSchedules() {
      const container = document.getElementById('schedule-list');
      container.innerHTML = '';

      if (Object.keys(currentSchedules).length === 0) {
        container.innerHTML = `<div class="text-center py-10 text-slate-400 text-sm">일정이 없습니다.</div>`;
        return;
      }

      const sortedKeys = Object.keys(currentSchedules).sort((a, b) => currentSchedules[a].day - currentSchedules[b].day);
      let currentDay = null;

      sortedKeys.forEach(key => {
        const item = currentSchedules[key];
        
        if (currentDay !== item.day) {
          currentDay = item.day;
          const dayHeader = document.createElement('div');
          dayHeader.className = 'font-bold text-indigo-600 border-b border-indigo-200 pb-1 mt-6 mb-3 flex items-center gap-1';
          dayHeader.innerHTML = `<i class="fa-solid fa-plane-departure text-sm"></i> DAY ${currentDay}`;
          container.appendChild(dayHeader);
        }

        const card = document.createElement('div');
        card.className = 'bg-white p-4 rounded-xl border border-slate-100 shadow-sm space-y-2 relative';
        
        const mapUrl = item.addr ? `https://uri.amap.com/search?keyword=${encodeURIComponent(item.addr)}` : '#';

        card.innerHTML = `
          <div class="flex justify-between items-start gap-2">
            <h3 class="font-bold text-slate-800 text-sm">${item.title || ''}</h3>
            <div class="flex gap-1 text-slate-400 text-xs shrink-0">
              <button onclick="editItem('schedule', '${key}')" class="p-1 hover:text-indigo-600"><i class="fa-solid fa-pen"></i></button>
              <button onclick="deleteData('schedules', '${key}')" class="p-1 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
          ${item.addr ? `<p class="text-xs text-slate-500 flex items-center gap-1"><i class="fa-solid fa-location-dot text-slate-400"></i> ${item.addr}</p>` : ''}
          ${item.trans ? `<div class="bg-slate-50 text-slate-600 text-xs p-2 rounded flex items-center gap-1.5"><i class="fa-solid fa-car text-indigo-500"></i> ${item.trans}</div>` : ''}
          ${item.tip ? `<div class="bg-amber-50 text-amber-800 text-xs p-2 rounded flex items-start gap-1.5"><i class="fa-regular fa-lightbulb text-amber-500 mt-0.5"></i> <div>${item.tip}</div></div>` : ''}
          ${item.addr ? `<div class="text-right pt-1"><a href="${mapUrl}" target="_blank" class="inline-flex items-center gap-1 text-[11px] bg-sky-50 text-sky-600 px-2.5 py-1 rounded-full hover:bg-sky-100 font-medium"><i class="fa-solid fa-map"></i> 고덕지도 연결</a></div>` : ''}
        `;
        container.appendChild(card);
      });
    }

    // 2. 장소 렌더링
    function renderPlaces() {
      const container = document.getElementById('places-list');
      container.innerHTML = '';

      Object.keys(currentPlaces).forEach(key => {
        const item = currentPlaces[key];
        const card = document.createElement('div');
        card.className = 'bg-white p-4 rounded-xl border border-slate-100 shadow-sm space-y-2';
        const mapUrl = item.addr ? `https://uri.amap.com/search?keyword=${encodeURIComponent(item.addr)}` : '#';

        card.innerHTML = `
          <div class="flex justify-between items-start gap-2">
            <div>
              <span class="text-[10px] bg-indigo-50 text-indigo-600 font-semibold px-2 py-0.5 rounded">${item.cat || '장소'}</span>
              <h3 class="font-bold text-slate-800 text-sm mt-1">${item.title || ''}</h3>
            </div>
            <div class="flex gap-1 text-slate-400 text-xs">
              <button onclick="editItem('place', '${key}')" class="p-1 hover:text-indigo-600"><i class="fa-solid fa-pen"></i></button>
              <button onclick="deleteData('places', '${key}')" class="p-1 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
          ${item.addr ? `<p class="text-xs text-slate-500"><i class="fa-solid fa-location-dot text-slate-400 mr-1"></i>${item.addr}</p>` : ''}
          ${item.tip ? `<div class="bg-amber-50 text-amber-800 text-xs p-2 rounded flex items-start gap-1.5"><i class="fa-regular fa-lightbulb text-amber-500 mt-0.5"></i> <div>${item.tip}</div></div>` : ''}
          ${item.addr ? `<div class="text-right pt-1"><a href="${mapUrl}" target="_blank" class="inline-flex items-center gap-1 text-[11px] bg-sky-50 text-sky-600 px-2.5 py-1 rounded-full hover:bg-sky-100 font-medium"><i class="fa-solid fa-map"></i> 고덕지도 연결</a></div>` : ''}
        `;
        container.appendChild(card);
      });
    }

    // 3. 회화 렌더링
    function renderSpeech() {
      const container = document.getElementById('speech-list');
      container.innerHTML = '';

      Object.keys(currentSpeech).forEach(key => {
        const item = currentSpeech[key];
        const card = document.createElement('div');
        card.className = 'bg-white p-4 rounded-xl border border-slate-100 shadow-sm space-y-1.5';

        card.innerHTML = `
          <div class="flex justify-between items-start">
            <span class="text-[10px] bg-emerald-50 text-emerald-600 font-semibold px-2 py-0.5 rounded">${item.tip || '회화'}</span>
            <div class="flex gap-1 text-slate-400 text-xs">
              <button onclick="editItem('speech', '${key}')" class="p-1 hover:text-indigo-600"><i class="fa-solid fa-pen"></i></button>
              <button onclick="deleteData('speech', '${key}')" class="p-1 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
          <div class="font-bold text-slate-800 text-sm">${item.kor || ''}</div>
          <div class="text-indigo-600 font-bold text-base">${item.cn || ''}</div>
          <div class="text-xs text-slate-500">${item.py || ''}</div>
        `;
        container.appendChild(card);
      });
    }

    // 삭제
    function deleteData(path, key) {
      if (confirm("이 항목을 삭제하시겠습니까?")) {
        db.ref(`${path}/${key}`).remove();
      }
    }

    // 모달 열기
    function openModal(type) {
      currentModalType = type;
      editKey = null;
      
      ['schedule', 'place', 'speech'].forEach(t => {
        document.getElementById(`form-${t}`).classList.add('hidden');
        document.getElementById(`form-${t}`).reset();
      });

      document.getElementById(`form-${type}`).classList.remove('hidden');
      document.getElementById('modal').classList.remove('hidden');
    }

    // 모달 닫기 / 수정 취소
    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    // 수정 모달
    function editItem(type, key) {
      editKey = key;
      openModal(type);

      if (type === 'schedule') {
        const item = currentSchedules[key];
        document.getElementById('sc-day').value = item.day || 1;
        document.getElementById('sc-title').value = item.title || '';
        document.getElementById('sc-addr').value = item.addr || '';
        document.getElementById('sc-trans').value = item.trans || '';
        document.getElementById('sc-tip').value = item.tip || '';
      } else if (type === 'place') {
        const item = currentPlaces[key];
        document.getElementById('pl-title').value = item.title || '';
        document.getElementById('pl-cat').value = item.cat || '';
        document.getElementById('pl-addr').value = item.addr || '';
        document.getElementById('pl-tip').value = item.tip || '';
      } else if (type === 'speech') {
        const item = currentSpeech[key];
        document.getElementById('sp-kor').value = item.kor || '';
        document.getElementById('sp-cn').value = item.cn || '';
        document.getElementById('sp-py').value = item.py || '';
        document.getElementById('sp-tip').value = item.tip || '';
      }
    }

    // 저장
    function saveData() {
      if (currentModalType === 'schedule') {
        const payload = {
          day: parseInt(document.getElementById('sc-day').value) || 1,
          title: document.getElementById('sc-title').value.trim(),
          addr: document.getElementById('sc-addr').value.trim(),
          trans: document.getElementById('sc-trans').value.trim(),
          tip: document.getElementById('sc-tip').value.trim()
        };
        if (editKey) db.ref(`schedules/${editKey}`).update(payload);
        else db.ref('schedules').push(payload);

      } else if (currentModalType === 'place') {
        const payload = {
          title: document.getElementById('pl-title').value.trim(),
          cat: document.getElementById('pl-cat').value.trim(),
          addr: document.getElementById('pl-addr').value.trim(),
          tip: document.getElementById('pl-tip').value.trim()
        };
        if (editKey) db.ref(`places/${editKey}`).update(payload);
        else db.ref('places').push(payload);

      } else if (currentModalType === 'speech') {
        const payload = {
          kor: document.getElementById('sp-kor').value.trim(),
          cn: document.getElementById('sp-cn').value.trim(),
          py: document.getElementById('sp-py').value.trim(),
          tip: document.getElementById('sp-tip').value.trim()
        };
        if (editKey) db.ref(`speech/${editKey}`).update(payload);
        else db.ref('speech').push(payload);
      }

      closeModal();
    }
  </script>
</body>
</html>
