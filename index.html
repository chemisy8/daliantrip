<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다롄 가족 여행 🍊</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <!-- Tailwind CSS & FontAwesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { font-family: 'Pretendard', sans-serif; background-color: #faf7f2; }
    .active-tab { border-bottom: 3px solid #f97316; color: #ea580c; font-weight: bold; }
    .cute-card { border-radius: 1.25rem; box-shadow: 0 4px 12px rgba(234, 88, 12, 0.05); }
    .toast-msg {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      background: rgba(45, 55, 72, 0.9); color: white; padding: 8px 18px;
      border-radius: 20px; font-size: 11px; z-index: 100; transition: opacity 0.3s;
    }
  </style>
</head>
<body class="text-slate-700 min-h-screen flex flex-col">

  <!-- 헤더 -->
  <header class="bg-gradient-to-r from-amber-200 via-orange-200 to-amber-100 text-slate-800 px-4 py-3.5 sticky top-0 z-50 border-b border-orange-100">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="text-base font-bold flex items-center gap-1.5 text-orange-950">
        ✈️ 다롄 가족 여행 🍊✨
      </h1>
      <span class="text-[10px] bg-white/60 text-orange-900 px-2 py-0.5 rounded-full flex items-center gap-1 font-medium">
        <span class="w-1.5 h-1.5 bg-orange-500 rounded-full animate-ping"></span> 실시간 연결
      </span>
    </div>
  </header>

  <!-- 메인 탭 메뉴 -->
  <nav class="bg-white/90 backdrop-blur-md border-b border-orange-100 sticky top-[49px] z-40">
    <div class="max-w-md mx-auto flex text-center text-xs font-medium">
      <button onclick="switchTab('schedule')" id="tab-schedule" class="flex-1 py-2.5 active-tab">
        🗓️ 일정
      </button>
      <button onclick="switchTab('places')" id="tab-places" class="flex-1 py-2.5 text-slate-400">
        📍 장소
      </button>
      <button onclick="switchTab('speech')" id="tab-speech" class="flex-1 py-2.5 text-slate-400">
        💬 회화
      </button>
    </div>
  </nav>

  <!-- 메인 컨테이너 -->
  <main class="max-w-md mx-auto p-3.5 flex-1 w-full">

    <!-- 1. 상세 일정 탭 -->
    <section id="sec-schedule" class="space-y-3">
      <div class="space-y-2">
        <div class="flex justify-between items-center px-1">
          <span class="text-xs font-bold text-orange-700">🗓️ 여행 스케줄</span>
          <div class="flex gap-1.5">
            <button onclick="resetToInitialData()" class="text-[11px] bg-slate-200 text-slate-600 px-2 py-1 rounded-full hover:bg-slate-300">
              🔄 원본 복구
            </button>
            <button onclick="openModal('schedule')" class="text-[11px] bg-orange-400 text-white px-2.5 py-1 rounded-full hover:bg-orange-500">
              + 일정 추가
            </button>
          </div>
        </div>

        <!-- DAY 필터 아이콘 -->
        <div class="flex gap-1.5 overflow-x-auto pb-1 text-[11px]">
          <button onclick="filterDay('all')" class="day-btn bg-orange-500 text-white px-3 py-1 rounded-full font-medium shrink-0">전체</button>
          <button onclick="filterDay(1)" class="day-btn bg-white text-slate-600 border border-orange-100 px-3 py-1 rounded-full shrink-0">🎈 DAY 1</button>
          <button onclick="filterDay(2)" class="day-btn bg-white text-slate-600 border border-orange-100 px-3 py-1 rounded-full shrink-0">🎈 DAY 2</button>
          <button onclick="filterDay(3)" class="day-btn bg-white text-slate-600 border border-orange-100 px-3 py-1 rounded-full shrink-0">🎈 DAY 3</button>
          <button onclick="filterDay(4)" class="day-btn bg-white text-slate-600 border border-orange-100 px-3 py-1 rounded-full shrink-0">🎈 DAY 4</button>
        </div>
      </div>

      <!-- 일정 목록 -->
      <div id="schedule-list" class="space-y-2.5"></div>
    </section>

    <!-- 2. 장소 탭 -->
    <section id="sec-places" class="space-y-2.5 hidden">
      <div class="flex justify-between items-center px-1">
        <span class="text-xs font-bold text-orange-700">📌 추천 장소</span>
        <button onclick="openModal('place')" class="text-[11px] bg-orange-400 text-white px-2.5 py-1 rounded-full">
          + 장소 추가
        </button>
      </div>
      <div id="places-list" class="space-y-2.5"></div>
    </section>

    <!-- 3. 회화 탭 -->
    <section id="sec-speech" class="space-y-2.5 hidden">
      <div class="flex justify-between items-center px-1">
        <span class="text-xs font-bold text-orange-700">🗣️ 상황별 현지 회화</span>
        <button onclick="openModal('speech')" class="text-[11px] bg-orange-400 text-white px-2.5 py-1 rounded-full">
          + 표현 추가
        </button>
      </div>

      <div id="speech-categories" class="flex gap-1 overflow-x-auto pb-1 text-[11px]">
        <button onclick="filterSpeech('전체')" class="sp-cat-btn bg-orange-500 text-white px-2.5 py-1 rounded-full shrink-0 font-medium">전체</button>
        <button onclick="filterSpeech('식당')" class="sp-cat-btn bg-white text-slate-500 border border-orange-100 px-2.5 py-1 rounded-full shrink-0">🍽️ 식당</button>
        <button onclick="filterSpeech('교통')" class="sp-cat-btn bg-white text-slate-500 border border-orange-100 px-2.5 py-1 rounded-full shrink-0">🚕 교통</button>
        <button onclick="filterSpeech('호텔')" class="sp-cat-btn bg-white text-slate-500 border border-orange-100 px-2.5 py-1 rounded-full shrink-0">🏨 호텔</button>
        <button onclick="filterSpeech('쇼핑')" class="sp-cat-btn bg-white text-slate-500 border border-orange-100 px-2.5 py-1 rounded-full shrink-0">🛍️ 쇼핑</button>
        <button onclick="filterSpeech('기타/긴급')" class="sp-cat-btn bg-white text-slate-500 border border-orange-100 px-2.5 py-1 rounded-full shrink-0">🚨 긴급/기타</button>
      </div>

      <div id="speech-list" class="space-y-2.5"></div>
    </section>

  </main>

  <!-- 푸터 -->
  <footer class="mt-auto py-4 px-3 text-center text-[11px] text-orange-800/60 bg-amber-100/40 border-t border-orange-100/60">
    <p class="font-medium">🍊 Dalian Family Travel Guide</p>
    <p class="text-[10px] text-slate-400 mt-0.5">© Safe & Happy Trip! ✨</p>
  </footer>

  <!-- 복사 토스트 -->
  <div id="toast" class="toast-msg hidden">📋 내용이 복사되었습니다!</div>

  <!-- 모달 창 -->
  <div id="modal" class="fixed inset-0 bg-black/30 backdrop-blur-xs hidden z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-sm w-full p-4 space-y-3 shadow-xl text-xs border border-orange-100 relative">
      <h3 id="modal-title" class="font-bold border-b border-orange-100 pb-2 text-orange-600 text-sm flex items-center gap-1">✨ 항목 편집</h3>
      
      <!-- 일정 폼 -->
      <div id="form-schedule" class="space-y-2 hidden">
        <div>
          <label class="block font-semibold text-slate-500 mb-0.5">일차 (숫자)</label>
          <input type="number" id="sc-day" min="1" value="1" class="w-full border border-orange-200 rounded-lg p-1.5 focus:outline-orange-400">
        </div>
        <div>
          <label class="block font-semibold text-slate-500 mb-0.5">시간 및 장소/일정 제목</label>
          <input type="text" id="sc-title" placeholder="예: [19:30] 🏨 동강 숙소 체크인" class="w-full border border-orange-200 rounded-lg p-1.5 focus:outline-orange-400">
        </div>
        <div>
          <label class="block font-semibold text-slate-500 mb-0.5">중문 가게/장소명 (복사 및 지도연동)</label>
          <input type="text" id="sc-store" placeholder="예: 壹刻壹家酒店(大连东港店)" class="w-full border border-orange-200 rounded-lg p-1.5 focus:outline-orange-400">
        </div>
        <div>
          <label class="block font-semibold text-slate-500 mb-0.5">이동 수단</label>
          <input type="text" id="sc-trans" placeholder="예: 🚕 택시 | 약 10분" class="w-full border border-orange-200 rounded-lg p-1.5 focus:outline-orange-400">
        </div>
        <div>
          <label class="block font-semibold text-slate-500 mb-0.5">꿀팁 / 메모</label>
          <textarea id="sc-tip" placeholder="참고할 메모 입력" class="w-full border border-orange-200 rounded-lg p-1.5 h-14 focus:outline-orange-400"></textarea>
        </div>
      </div>

      <!-- 장소 폼 -->
      <div id="form-place" class="space-y-2 hidden">
        <div>
          <label class="block font-semibold text-slate-500 mb-0.5">장소명</label>
          <input type="text" id="pl-title" placeholder="장소명 입력" class="w-full border border-orange-200 rounded-lg p-1.5">
        </div>
        <div>
          <label class="block font-semibold text-slate-500 mb-0.5">카테고리</label>
          <input type="text" id="pl-cat" placeholder="맛집 / 쇼핑 / 온천 등" class="w-full border border-orange-200 rounded-lg p-1.5">
        </div>
        <div>
          <label class="block font-semibold text-slate-500 mb-0.5">중문 가게/장소명</label>
          <input type="text" id="pl-store" placeholder="중문 이름 입력" class="w-full border border-orange-200 rounded-lg p-1.5">
        </div>
        <div>
          <label class="block font-semibold text-slate-500 mb-0.5">메모/팁</label>
          <textarea id="pl-tip" placeholder="꿀팁 입력" class="w-full border border-orange-200 rounded-lg p-1.5 h-14"></textarea>
        </div>
      </div>

      <!-- 회화 폼 -->
      <div id="form-speech" class="space-y-2 hidden relative">
        <button type="button" onclick="pasteFromClipboard()" class="w-full py-1.5 bg-amber-100 text-amber-800 font-bold rounded-lg text-xs hover:bg-amber-200 transition-colors border border-amber-300/60 flex items-center justify-center gap-1">
          📋 복사한 텍스트 바로 가져오기
        </button>

        <div>
          <label class="block font-semibold text-slate-500 mb-0.5">한국어 표현</label>
          <input type="text" id="sp-kor" placeholder="예: 고수, 얼마, 계산, 화장실 등" class="w-full border border-orange-200 rounded-lg p-1.5 focus:outline-orange-400">
        </div>

        <button type="button" onclick="autoFillChinese()" class="w-full py-1 bg-orange-100 text-orange-700 font-bold rounded-lg text-[11px] hover:bg-orange-200 transition-colors border border-orange-200">
          🪄 한자/발음 사전 자동 완성
        </button>

        <div>
          <label class="block font-semibold text-slate-500 mb-0.5">중국어 (한자)</label>
          <input type="text" id="sp-cn" placeholder="예: 不要香菜" class="w-full border border-orange-200 rounded-lg p-1.5">
        </div>
        <div>
          <label class="block font-semibold text-slate-500 mb-0.5 text-slate-400">발음 안내 <span class="font-normal text-[10px] text-orange-500">(선택 입력)</span></label>
          <input type="text" id="sp-py" placeholder="예: 부야오 샹차이" class="w-full border border-orange-200 rounded-lg p-1.5">
        </div>
        <div>
          <label class="block font-semibold text-slate-500 mb-0.5">상황 카테고리</label>
          <input type="text" id="sp-tip" placeholder="식당 / 교통 / 호텔 / 쇼핑 / 기타/긴급" class="w-full border border-orange-200 rounded-lg p-1.5">
        </div>
      </div>

      <div class="flex justify-end gap-1.5 pt-2 border-t border-orange-100">
        <button type="button" onclick="closeModal()" class="px-3 py-1 text-slate-500 bg-slate-100 rounded-full hover:bg-slate-200">취소</button>
        <button type="button" onclick="saveData()" class="px-3 py-1 text-white bg-orange-400 rounded-full hover:bg-orange-500 font-bold">저장 🍊</button>
      </div>
    </div>
  </div>

  <script>
    // 1. Firebase 설정
    const firebaseConfig = {
      databaseURL: "https://myawesome-a2ea8-default-rtdb.firebaseio.com/"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // 내장 사전
    const speechDict = [
      { key: "고수", cn: "不要香菜", py: "부야오 샹차이", tip: "식당" },
      { key: "츠란", cn: "不要孜然", py: "부야오 쯔란", tip: "식당" },
      { key: "맵지", cn: "要不辣的", py: "야오 부 라 더", tip: "식당" },
      { key: "계산", cn: "买单", py: "마이단", tip: "식당" },
      { key: "가주세요", cn: "请带 me 去这个地方", py: "칭 다이 워 취 저거 디팡", tip: "교통" },
      { key: "화장실", cn: "洗手间在哪里？", py: "시쇼우지엔 자이 나리?", tip: "기타/긴급" }
    ];

    const initialSchedules = [
      { day: 1, title: "[19:30] 🏨 동강 숙소 체크인", storeName: "壹刻壹家酒店(大连东港店)", trans: "🚕 택시 | 약 10분", tip: "동강 1박 숙소 도착 후 짐 정리" },
      { day: 1, title: "[20:30] 🍗 저녁: 喝丢一只鞋 (인민로점)", storeName: "喝丢一只鞋(人民路店)", trans: "🏃‍♂️ 도보 | 약 10~15분", tip: "양꼬치 주문 시 츠란 제거 요청! (不要孜然!)" },
      { day: 1, title: "[21:30] 🌊 동방수성 (베니스 수운하)", storeName: "东方水城", trans: "🚕 택시 | 약 5~10분", tip: "야경 산책 후 동강 숙소 복귀 (1박)" },
      { day: 2, title: "[10:00] 🏨 인터컨티넨탈 호텔", storeName: "大连中远海运洲际酒店", trans: "🚕 택시 | 약 20~25분", tip: "연박 숙소에 미리 짐 보관" },
      { day: 2, title: "[10:30] 🐬 대련 성해해양세계", storeName: "圣亚海洋世界", trans: "🏃‍♂️ 도보 | 약 5분", tip: "11:00 돌고래 쇼 필수 관람!" },
      { day: 3, title: "[10:30] 🏘️ 동관거리 (东关街)", storeName: "东关街", trans: "🏃‍♂️ 도보 이동", tip: "레트로 감성 고거리 사진 촬영" },
      { day: 4, title: "[10:00] 🏨 인터컨티넨탈 체크아웃", storeName: "大连中远海运洲际酒店", trans: "🚕 택시 | 약 25~30분", tip: "모든 짐 지참 후 고라리조트로 이동" }
    ];

    const initialPlaces = [
      { title: "喝丢一只鞋 (인민로점)", cat: "맛집", storeName: "喝丢一只鞋(人民路店)", tip: "양꼬치 츠란 빼달라고 꼭 요청! (不要孜然)." },
      { title: "喜鼎海胆水饺", cat: "맛집", storeName: "喜鼎海胆水饺(星海店)", tip: "성게알 만두(海胆水饺) 강추." }
    ];

    const initialSpeech = [
      { kor: "고수 넣지 마세요", cn: "不要香菜", py: "부야오 샹차이", tip: "식당" },
      { kor: "계산할게요", cn: "买单", py: "", tip: "식당" }
    ];

    let currentSchedules = {};
    let currentPlaces = {};
    let currentSpeech = {};
    let selectedDay = 'all';
    let currentSpeechCategory = '전체';
    let currentModalType = 'schedule';
    let editKey = null;

    // Firebase 동기화
    db.ref("schedules").on("value", (snapshot) => {
      const data = snapshot.val();
      if (!data) { resetToInitialData(); return; }
      currentSchedules = data;
      renderSchedules();
    });

    db.ref("places").on("value", (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        const obj = {};
        initialPlaces.forEach(item => obj[db.ref("places").push().key] = item);
        db.ref("places").set(obj);
        return;
      }
      currentPlaces = data;
      renderPlaces();
    });

    db.ref("speech").on("value", (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        const obj = {};
        initialSpeech.forEach(item => obj[db.ref("speech").push().key] = item);
        db.ref("speech").set(obj);
        return;
      }
      currentSpeech = data;
      renderSpeech();
    });

    // 📋 클립보드 텍스트 바로 가져오기
    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        if (text) {
          document.getElementById('sp-cn').value = text;
          document.getElementById('sp-kor').value = text;
          alert("📋 복사된 내용이 입력되었습니다!");
        }
      } catch (err) {
        alert("클립보드 접근 권한이 필요하거나 복사된 내용이 없습니다.");
      }
    }

    // 🪄 자동 채우기
    function autoFillChinese() {
      const inputKor = document.getElementById('sp-kor').value.trim();
      if (!inputKor) { alert("한국어 표현을 먼저 입력해 주세요!"); return; }
      const matched = speechDict.find(item => inputKor.includes(item.key) || item.key.includes(inputKor));
      if (matched) {
        document.getElementById('sp-cn').value = matched.cn;
        document.getElementById('sp-py').value = matched.py;
        document.getElementById('sp-tip').value = matched.tip;
      } else {
        alert("사전에 없는 표현입니다. 직관적으로 작성해 주세요!");
      }
    }

    // 📋 클립보드 복사
    function copyToClipboard(text) {
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.innerText = `📋 "${text}" 복사 완료!`;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 2000);
      });
    }

    // 🗺️ 고덕지도 검색 연동 함수 (수정본)
function openAmap(storeName) {
  if (!storeName) return;
  const encoded = encodeURIComponent(storeName);
  
  // 고덕지도 웹/모바일 웹 정식 검색 URL
  const amapUrl = `https://www.amap.com/search?query=${encoded}`;
  
  window.open(amapUrl, '_blank');
}

  
    // DAY 필터링
    function filterDay(day) {
      selectedDay = day;
      const btns = document.querySelectorAll('.day-btn');
      btns.forEach(btn => {
        if ((day === 'all' && btn.innerText.includes('전체')) || (day !== 'all' && btn.innerText.includes(`DAY ${day}`))) {
          btn.className = "day-btn bg-orange-500 text-white px-3 py-1 rounded-full font-medium shrink-0 shadow-xs";
        } else {
          btn.className = "day-btn bg-white text-slate-600 border border-orange-100 px-3 py-1 rounded-full shrink-0";
        }
      });
      renderSchedules();
    }

    function renderSchedules() {
      const container = document.getElementById('schedule-list');
      container.innerHTML = '';

      if (!currentSchedules || Object.keys(currentSchedules).length === 0) {
        container.innerHTML = `<div class="text-center py-8 text-orange-300 text-xs">등록된 일정이 없습니다.</div>`;
        return;
      }

      const sortedKeys = Object.keys(currentSchedules).sort((a, b) => currentSchedules[a].day - currentSchedules[b].day);
      let currentDayHeader = null;

      sortedKeys.forEach(key => {
        const item = currentSchedules[key];
        if (selectedDay !== 'all' && item.day != selectedDay) return;

        if (currentDayHeader !== item.day) {
          currentDayHeader = item.day;
          const dayHeader = document.createElement('div');
          dayHeader.className = 'font-bold text-xs text-orange-700 pb-0.5 mt-3 mb-1.5 flex items-center gap-1 border-b border-orange-200/60';
          dayHeader.innerHTML = `<span>🍊 DAY ${currentDayHeader}</span>`;
          container.appendChild(dayHeader);
        }

        const card = document.createElement('div');
        card.className = 'bg-white p-3.5 cute-card border border-orange-100/60 space-y-2 text-xs';

        card.innerHTML = `
          <div class="flex justify-between items-start gap-1">
            <h3 class="font-bold text-slate-800 text-xs leading-snug">${item.title || ''}</h3>
            <div class="flex gap-2 text-orange-400 text-xs shrink-0">
              <button onclick="editItem('schedule', '${key}')" class="hover:text-orange-600 p-1"><i class="fa-solid fa-pen"></i></button>
              <button onclick="deleteData('schedules', '${key}')" class="hover:text-rose-500 p-1"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
          ${item.trans ? `<div class="text-[11px] text-slate-500 flex items-center gap-1"><i class="fa-solid fa-car text-orange-300"></i> ${item.trans}</div>` : ''}
          ${item.tip ? `<div class="bg-orange-50/70 text-orange-950 text-[11px] p-2 rounded-xl font-medium">${item.tip}</div>` : ''}
          ${item.storeName ? `
            <div class="bg-amber-50/60 p-2 rounded-xl text-[11px] text-amber-800 font-semibold flex justify-between items-center border border-amber-100/50">
              <span class="truncate max-w-[180px]">🏷️ ${item.storeName}</span>
              <div class="flex items-center gap-1 shrink-0">
                <button onclick="copyToClipboard('${item.storeName}')" class="text-[9px] bg-white px-2 py-0.5 rounded-full shadow-2xs text-amber-700 border border-amber-200 hover:bg-amber-100">
                  📋 복사
                </button>
                <button onclick="openAmap('${item.storeName}')" class="text-[9px] bg-blue-500 text-white px-2 py-0.5 rounded-full shadow-2xs font-bold hover:bg-blue-600">
                  🗺️ 고덕지도
                </button>
              </div>
            </div>
          ` : ''}
        `;
        container.appendChild(card);
      });
    }

    function renderPlaces() {
      const container = document.getElementById('places-list');
      container.innerHTML = '';
      Object.keys(currentPlaces).forEach(key => {
        const item = currentPlaces[key];
        const card = document.createElement('div');
        card.className = 'bg-white p-3.5 cute-card border border-orange-100/60 space-y-2 text-xs';

        card.innerHTML = `
          <div class="flex justify-between items-start">
            <div class="flex items-center gap-1.5">
              <span class="text-[9px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-bold">${item.cat || '장소'}</span>
              <h3 class="font-bold text-slate-800 text-xs">${item.title || ''}</h3>
            </div>
            <div class="flex gap-2 text-orange-400 text-xs">
              <button onclick="editItem('place', '${key}')" class="hover:text-orange-600 p-1"><i class="fa-solid fa-pen"></i></button>
              <button onclick="deleteData('places', '${key}')" class="hover:text-rose-500 p-1"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
          ${item.tip ? `<div class="bg-orange-50/70 text-orange-950 text-[11px] p-2 rounded-xl">${item.tip}</div>` : ''}
          ${item.storeName ? `
            <div class="bg-amber-50/60 p-2 rounded-xl text-[11px] text-amber-800 font-semibold flex justify-between items-center border border-amber-100/50">
              <span class="truncate max-w-[180px]">🏷️ ${item.storeName}</span>
              <div class="flex items-center gap-1 shrink-0">
                <button onclick="copyToClipboard('${item.storeName}')" class="text-[9px] bg-white px-2 py-0.5 rounded-full text-amber-700 border border-amber-200 hover:bg-amber-100">
                  📋 복사
                </button>
                <button onclick="openAmap('${item.storeName}')" class="text-[9px] bg-blue-500 text-white px-2 py-0.5 rounded-full font-bold hover:bg-blue-600">
                  🗺️ 고덕지도
                </button>
              </div>
            </div>
          ` : ''}
        `;
        container.appendChild(card);
      });
    }

    function renderSpeech() {
      const container = document.getElementById('speech-list');
      container.innerHTML = '';

      Object.keys(currentSpeech).forEach(key => {
        const item = currentSpeech[key];
        if (currentSpeechCategory !== '전체' && !(item.tip || '').includes(currentSpeechCategory)) return;

        const card = document.createElement('div');
        card.className = 'bg-white p-3.5 cute-card border border-orange-100/60 space-y-1.5 text-xs';

        card.innerHTML = `
          <div class="flex justify-between items-center">
            <span class="text-[9px] bg-orange-100 text-orange-700 font-bold px-2 py-0.5 rounded-full">${item.tip || '일반'}</span>
            <div class="flex gap-2 text-orange-400 text-xs">
              <button onclick="editItem('speech', '${key}')" class="hover:text-orange-600 p-1"><i class="fa-solid fa-pen"></i></button>
              <button onclick="deleteData('speech', '${key}')" class="hover:text-rose-500 p-1"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
          <div class="font-bold text-slate-700 text-xs mt-1">${item.kor || ''}</div>
          <div class="flex items-center justify-between bg-orange-50/50 p-2.5 rounded-xl border border-orange-100/40">
            <div>
              <div class="text-orange-600 font-bold text-sm">${item.cn || ''}</div>
              ${item.py ? `<div class="text-[10px] text-slate-400">${item.py}</div>` : ''}
            </div>
            <button onclick="speakChinese('${item.cn}')" class="bg-white p-2 rounded-full shadow-2xs text-orange-500 hover:bg-orange-100 text-sm flex items-center justify-center w-8 h-8">
              🔊
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function openModal(type) {
      currentModalType = type;
      ['schedule', 'place', 'speech'].forEach(t => {
        document.getElementById(`form-${t}`).classList.add('hidden');
      });
      document.getElementById(`form-${type}`).classList.remove('hidden');
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      editKey = null;
    }

    function editItem(type, key) {
      editKey = key;
      openModal(type);

      if (type === 'schedule') {
        const item = currentSchedules[key];
        document.getElementById('sc-day').value = item.day || 1;
        document.getElementById('sc-title').value = item.title || '';
        document.getElementById('sc-store').value = item.storeName || '';
        document.getElementById('sc-trans').value = item.trans || '';
        document.getElementById('sc-tip').value = item.tip || '';
      } else if (type === 'place') {
        const item = currentPlaces[key];
        document.getElementById('pl-title').value = item.title || '';
        document.getElementById('pl-cat').value = item.cat || '';
        document.getElementById('pl-store').value = item.storeName || '';
        document.getElementById('pl-tip').value = item.tip || '';
      } else if (type === 'speech') {
        const item = currentSpeech[key];
        document.getElementById('sp-kor').value = item.kor || '';
        document.getElementById('sp-cn').value = item.cn || '';
        document.getElementById('sp-py').value = item.py || '';
        document.getElementById('sp-tip').value = item.tip || '';
      }
    }

    function saveData() {
      if (currentModalType === 'schedule') {
        const payload = {
          day: parseInt(document.getElementById('sc-day').value) || 1,
          title: document.getElementById('sc-title').value.trim(),
          storeName: document.getElementById('sc-store').value.trim(),
          trans: document.getElementById('sc-trans').value.trim(),
          tip: document.getElementById('sc-tip').value.trim()
        };
        if (editKey) db.ref(`schedules/${editKey}`).update(payload);
        else db.ref('schedules').push(payload);

      } else if (currentModalType === 'place') {
        const payload = {
          title: document.getElementById('pl-title').value.trim(),
          cat: document.getElementById('pl-cat').value.trim(),
          storeName: document.getElementById('pl-store').value.trim(),
          tip: document.getElementById('pl-tip').value.trim()
        };
        if (editKey) db.ref(`places/${editKey}`).update(payload);
        else db.ref('places').push(payload);

      } else if (currentModalType === 'speech') {
        const payload = {
          kor: document.getElementById('sp-kor').value.trim(),
          cn: document.getElementById('sp-cn').value.trim(),
          py: document.getElementById('sp-py').value.trim(),
          tip: document.getElementById('sp-tip').value.trim() || '기타'
        };
        if (editKey) db.ref(`speech/${editKey}`).update(payload);
        else db.ref('speech').push(payload);
      }

      closeModal();
    }

    function deleteData(path, key) {
      if (confirm("삭제하시겠습니까?")) {
        db.ref(`${path}/${key}`).remove();
      }
    }

    function switchTab(type) {
      ['schedule', 'places', 'speech'].forEach(t => {
        document.getElementById(`sec-${t}`).classList.add('hidden');
        document.getElementById(`tab-${t}`).classList.remove('active-tab');
        document.getElementById(`tab-${t}`).classList.add('text-slate-400');
      });
      document.getElementById(`sec-${type}`).classList.remove('hidden');
      document.getElementById(`tab-${type}`).classList.add('active-tab');
      document.getElementById(`tab-${type}`).classList.remove('text-slate-400');
    }

    function filterSpeech(cat) {
      currentSpeechCategory = cat;
      document.querySelectorAll('.sp-cat-btn').forEach(btn => {
        if (btn.innerText.includes(cat)) {
          btn.className = "sp-cat-btn bg-orange-500 text-white px-2.5 py-1 rounded-full shrink-0 font-medium";
        } else {
          btn.className = "sp-cat-btn bg-white text-slate-500 border border-orange-100 px-2.5 py-1 rounded-full shrink-0";
        }
      });
      renderSpeech();
    }

    function resetToInitialData() {
      if (confirm("초기 데이터로 복구하시겠습니까?")) {
        const schObj = {}, plObj = {}, spObj = {};
        initialSchedules.forEach(item => schObj[db.ref("schedules").push().key] = item);
        initialPlaces.forEach(item => plObj[db.ref("places").push().key] = item);
        initialSpeech.forEach(item => spObj[db.ref("speech").push().key] = item);

        db.ref("schedules").set(schObj);
        db.ref("places").set(plObj);
        db.ref("speech").set(spObj);
      }
    }

    function speakChinese(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
      }
    }
  </script>
</body>
</html>
